# ─────────────────────────────────────────────────────────────────────────────
# UniAttackDetection – Protocol 2.2 Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Paths ──────────────────────────────────────────────────────────────────
data_root: "C:\\Users\\bhask\\Documents\\Project\\Resnet_50\\UniAttackData_P"

train_txt: "C:\\Users\\bhask\\Documents\\Project\\Resnet_50\\path\\UniAttackData@p2.2_image_train_cropped.txt"
dev_txt:   "C:\\Users\\bhask\\Documents\\Project\\Resnet_50\\path\\UniAttackData@p2.2_image_dev_cropped.txt"
test_txt:  "C:\\Users\\bhask\\Documents\\Project\\Resnet_50\\path\\UniAttackData@p2.2_image_test_cropped.txt"

output_dir: "checkpoints_4_student_p2.2"

# ── CLIP backbone ──────────────────────────────────────────────────────────
clip_model: "ViT-B/16"

# ── TSP module ─────────────────────────────────────────────────────────────
num_student_tokens:    16    # N learnable prefix tokens
num_teacher_templates: 6     # Best value from paper ablation (T1-T6)

# ── UKM loss weight ────────────────────────────────────────────────────────
lambda_ufm: 1.0

# ── Training ───────────────────────────────────────────────────────────────
epochs:      20            # More epochs for convergence (paper trains ~50)
batch_size:  32
accum_steps: 2               # Effective batch = 64 (helps stability)
lr:          2.0e-4          # Slightly higher, warmup will ramp it up safely
wd:          1.0e-4
num_workers: 4
